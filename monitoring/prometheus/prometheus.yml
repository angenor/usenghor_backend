global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: usenghor
    env: ${PROMETHEUS_ENV:-local}

scrape_configs:
  - job_name: node-exporter
    static_configs:
      - targets: ['node-exporter:9100']
        labels:
          service: vps-host

  - job_name: cadvisor
    static_configs:
      - targets: ['cadvisor:8080']
        labels:
          service: docker-containers
